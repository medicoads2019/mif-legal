<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Indian Festivals | Legal Information</title>
    <meta
      name="description"
      content="Privacy Policy and Terms & Conditions for My Indian Festivals."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Merriweather:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-one" aria-hidden="true"></div>
    <div class="bg-orb orb-two" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>

    <main class="container">
      <header class="hero">
        <div class="brand-pill">
          <img
            class="brand-logo"
            id="brandLogo"
            src="./assets/MIFLogo.png"
            alt="My Indian Festivals logo"
          />
          <div
            class="brand-logo-fallback"
            id="brandLogoFallback"
            aria-hidden="true"
          >
            MIF
          </div>
          <div>
            <p class="kicker">MY INDIAN FESTIVALS</p>
            <h1>Legal Center</h1>
          </div>
        </div>
      </header>

      <section class="cards" id="contentRoot">
        <article class="card" id="privacyCard">
          <h2>Privacy Policy</h2>
          <div class="content" id="privacyContent">Loading...</div>
        </article>

        <article class="card" id="termsCard">
          <h2>Terms and Conditions</h2>
          <div class="content" id="termsContent">Loading...</div>
        </article>
      </section>

      <footer class="footer-note">
        <p>
          Copyright © <span id="copyrightYear"></span> My Indian Festivals. All
          rights reserved.
        </p>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
